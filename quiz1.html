          { type: 'math', content: <React.Fragment>AD = 2500 + 0.75Y</React.Fragment> }

      {
        id: 2,

          </div>
        ),
        explanationSteps: [
          { type: 'text', content: <React.Fragment>שלב 1: נזהה את הנטייה השולית להוציא (<M>MPE</M>) מתוך משוואת הביקוש המצרפי:</React.Fragment> },
          { type: 'math', content: <React.Fragment>AD = 2500 + 0.75Y <Arrow/> MPE = 0.75</React.Fragment> },
          { type: 'text', content: <React.Fragment>שלב 2: נציב את הנתון בנוסחת המכפיל הקיינסיאני הפשוט (<M>K</M>):</React.Fragment> },
          { type: 'math', content: <React.Fragment>K = <Frac n="1" d="1 - MPE"/></React.Fragment> },

          <React.Fragment>

          <React.Fragment>קיים פער אינפלציוני <En>Inflationary Gap</En> של <M>1,600</M></React.Fragment>,

            <p>פער זה (שמייצג את החוסר בביקוש ההתחלתי) מחושב כך:</p>
            <div className="flex flex-row items-center justify-start bg-indigo-50/80 p-3 rounded-lg border border-indigo-100 text-indigo-950 font-semibold w-fit">

              <span dir="ltr" className="font-serif text-xl"><Frac n={<span className="font-sans">פער התוצר</span>} d="K"/></span>
            </div>
          </div>
        ),
        explanationSteps: [
          { type: 'text', content: <React.Fragment>שלב 1: זיהוי מצב המשק. מאחר שתוצר שיווי המשקל קטן מתוצר התעסוקה המלאה, המשק מצוי באבטלה ולכן קיים פער דיפלציוני <En>Deflationary Gap</En>:</React.Fragment> },
          { type: 'math', content: <React.Fragment>Y<Sub>E</Sub> = 10,000 {"<"} Y<Sub>F</Sub> = 11,600</React.Fragment> },
          { type: 'text', content: <React.Fragment>שלב 2: נחשב את פער התוצר (ההפרש הכולל בין התוצר הרצוי לתוצר המצוי <M><Delta/>Y</M>):</React.Fragment> },

            <div className="flex flex-col items-start bg-slate-50 border border-slate-200 py-4 px-6 rounded-2xl mb-6 shadow-sm w-full md:w-fit">

          </div>

        explanationSteps: [

                          Y<Sub>D</Sub> = Y - T<Sub>N</Sub> - S<Sub>B</Sub>
                        </div>
                        <p className="text-sm text-slate-600 mt-2 leading-tight">
                          <strong>מקרא:</strong> <M>Y<Sub>D</Sub></M> הכנסה פנויה, <M>Y</M> תוצר (הכנסה), <M>T<Sub>N</Sub></M> מיסים נטו (מיסים פחות תשלומי העברה), ו-<M>S<Sub>B</Sub></M> הם רווחים שלא חולקו (אפס, אלא אם נאמר אחרת).
                        </p>
                      </div>
                      <div>
                        <div dir="ltr" className="text-left font-semibold text-xl text-indigo-950 bg-white py-2 px-3 rounded shadow-sm border border-indigo-100 inline-block font-serif tracking-wider">
                          C = C<Sub>0</Sub> + MPC <Dot/> Y<Sub>D</Sub>
                        </div>
                        <p className="text-sm text-slate-600 mt-2 leading-tight">
                          <strong>מקרא:</strong> <M>C<Sub>0</Sub></M> צריכה אוטונומית. נהוג פעמים רבות לכתוב את הצריכה כתלות ישירה בתוצר, ואז הרישום יהיה <span dir="ltr" className="font-serif font-semibold bg-slate-100 px-1 rounded mx-1">C = C<Sub>0</Sub> + MPC <Dot/> Y</span>.
                        </p>
                      </div>
                      <div>
                        <div dir="ltr" className="text-left font-semibold text-xl text-indigo-950 bg-white py-2 px-3 rounded shadow-sm border border-indigo-100 inline-block font-serif tracking-wider">
                          S<Sub>P</Sub> = Y<Sub>D</Sub> - C
                        </div>
                        <p className="text-sm text-slate-600 mt-2 leading-tight">חיסכון פרטי מוגדר כיתרת ההכנסה הפנויה שלא נצרכה.</p>
                      </div>
                    </div>
                  </div>

                  {/* Card 2 */}
                  <div className="bg-slate-50 p-6 rounded-2xl border border-slate-200 shadow-sm hover:shadow-md transition-shadow">
                    <h3 className="text-xl font-bold text-slate-800 mb-4 flex items-center border-b border-slate-200 pb-2">
                      <Calculator className="w-5 h-5 ml-2 text-indigo-600" />
                      ביקוש מצרפי ושיווי משקל
                    </h3>
                    <div className="space-y-4">
                      <div>
                        <div dir="ltr" className="text-left font-semibold text-xl text-indigo-950 bg-white py-2 px-3 rounded shadow-sm border border-indigo-100 inline-block font-serif tracking-wider">
                          AD = C + I + G
                        </div>
                      </div>
                      <div>
                        <div dir="ltr" className="text-left font-semibold text-xl text-indigo-950 bg-white py-2 px-3 rounded shadow-sm border border-indigo-100 inline-block font-serif tracking-wider">
                          AD = AD<Sub>0</Sub> + MPE <Dot/> Y
                        </div>
                        <p className="text-sm text-slate-600 mt-2 leading-tight">
                          <strong>הערה חשובה:</strong> <M>AD<Sub>0</Sub></M> הוא סיכום הערכים האוטונומיים (שאינם תלויים בתוצר <M>Y</M>) שמתקבלים כתוצאה מפתיחת משוואת הביקוש המצרפי.
                        </p>
                      </div>
                      <div>
                        <div dir="ltr" className="text-left font-semibold text-[1.35rem] text-indigo-800 bg-indigo-100/50 py-2 px-3 rounded shadow-sm border border-indigo-200 inline-block font-serif tracking-wider">
                          Y<Sub>E</Sub> = AD<Sub>0</Sub> <Dot/> K
                        </div>
                        <p className="text-sm text-slate-600 mt-2 leading-tight">
                          <strong>מקרא:</strong> <M>Y<Sub>E</Sub></M> מבטא את <b>תוצר שיווי המשקל</b> במשק – הנקודה שבה סך הביקושים המצרפיים (<M>AD</M>) שווים בדיוק לסך הייצור/התוצר (<M>Y</M>). <M>K</M> הוא המכפיל הקיינסיאני.
                        </p>
                      </div>
                    </div>
                  </div>

                  {/* Card 3 */}
                  <div className="bg-slate-50 p-6 rounded-2xl border border-slate-200 shadow-sm hover:shadow-md transition-shadow">
                    <h3 className="text-xl font-bold text-slate-800 mb-4 flex items-center border-b border-slate-200 pb-2">
                      <Calculator className="w-5 h-5 ml-2 text-indigo-600" />
                      מכפילים ונטיות שוליות
                    </h3>
                    <div className="space-y-4">
                      <p className="text-sm text-slate-600 leading-tight">
                        <strong className="text-slate-800 font-serif font-bold tracking-wide" dir="ltr">MPC</strong> - נטייה שולית לצרוך: הגידול בצריכה עקב גידול של שקל בהכנסה הפנויה.<br/>
                        <strong className="text-slate-800 font-serif font-bold tracking-wide mt-1 inline-block" dir="ltr">MPI</strong> - נטייה שולית להשקיע: הגידול בהשקעה עקב גידול של שקל בתוצר.
                      </p>
                      <div>
                        <div dir="ltr" className="text-left font-semibold text-xl text-indigo-950 bg-white py-2 px-3 rounded shadow-sm border border-indigo-100 inline-block font-serif tracking-wider">
                          MPE = MPC + MPI
                        </div>
                        <p className="text-sm text-slate-600 mt-2 leading-tight">
                          <M>MPE</M> (הנטייה השולית להוציא) מוגדרת כחיבור פשוט של שתי הנטיות (מודל ללא מיסים יחסיים).
                        </p>
                      </div>
                      <div>
                        <div dir="ltr" className="text-left font-semibold text-[1.4rem] text-indigo-800 bg-indigo-100/50 py-2 px-3 rounded shadow-sm border border-indigo-200 inline-block font-serif tracking-wider">
                          K = <Frac n="1" d="1 - MPE"/>
                        </div>
                        <p className="text-sm text-slate-600 mt-2 leading-tight">
                          זהו <b>המכפיל הקיינסיאני הפשוט</b>, הקובע פי כמה יגדל התוצר כתוצאה משינוי בביקוש האוטונומי.
                        </p>
                      </div>
                    </div>
                  </div>

                  {/* Card 4 */}
                  <div className="bg-slate-50 p-6 rounded-2xl border border-slate-200 shadow-sm hover:shadow-md transition-shadow">
                    <h3 className="text-xl font-bold text-slate-800 mb-4 flex items-center border-b border-slate-200 pb-2">
                      <Calculator className="w-5 h-5 ml-2 text-indigo-600" />
                      פערים במשק
                    </h3>
                    <div className="space-y-4">
                      <div>
                        <p className="text-sm text-slate-700 leading-tight mb-2">
                          <strong className="text-slate-900 underline decoration-indigo-200 decoration-2">פער התוצר (<M><Delta/>Y</M>)</strong>: הפער במונחי ייצור. זהו ההפרש המוחלט בין פוטנציאל הייצור של המשק (תעסוקה מלאה <M>Y<Sub>F</Sub></M>) לבין הייצור בפועל (<M>Y<Sub>E</Sub></M>).
                        </p>
                        <div dir="ltr" className="text-left font-semibold text-xl text-indigo-950 bg-white py-2 px-3 rounded shadow-sm border border-indigo-100 inline-block font-serif tracking-wider">
                          <Delta/>Y = Y<Sub>F</Sub> - Y<Sub>E</Sub>
                        </div>
                      </div>
                      <div>
                        <p className="text-sm text-slate-700 leading-tight mb-2">
                          <strong className="text-slate-900 underline decoration-indigo-200 decoration-2">ההבדל בין סוגי הפערים</strong>:<br/>
                          • <b>פער דיפלציוני <En>Deflationary Gap</En></b>: נוצר כשהמשק ב<b>אבטלה</b> (<M>Y<Sub>E</Sub> {"<"} Y<Sub>F</Sub></M>). מתאר מחסור התחלתי בביקוש.<br/>
                          <span className="mt-1 inline-block">• <b>פער אינפלציוני <En>Inflationary Gap</En></b>: נוצר כשהמשק ב<b>תעסוקת יתר/אינפלציה</b> (<M>Y<Sub>E</Sub> {">"} Y<Sub>F</Sub></M>). מתאר עודף התחלתי בביקוש.</span>
                        </p>
                        <div className="flex flex-row items-center justify-start bg-rose-50 p-2.5 rounded-lg border border-rose-200 text-rose-900 font-semibold w-fit mt-2">
                          <span className="font-sans text-[0.85em] ml-2">פער דיפלציוני / אינפלציוני</span>
                          <span>=</span>
                          <span dir="ltr" className="font-serif text-xl ml-2"><Frac n={<React.Fragment><Delta/>Y</React.Fragment>} d="K"/></span>
                        </div>
                      </div>
                    </div>
                  </div>

                </div>

                <div className="flex flex-col items-center">
                  <button
                    onClick={() => setStarted(true)}
                    className="bg-indigo-600 hover:bg-indigo-700 text-white text-xl font-bold py-4 px-12 rounded-full shadow-lg transition-transform hover:scale-105 mb-6"
                  >
                    התחל תרגיל
                  </button>
                  
                  <div className="text-center text-slate-500 text-sm border-t border-slate-200 pt-6 w-full">
                    <p className="mb-2">פותח עבור הסטודנטים בקורס. קרדיט לתוכן: ד"ר שי צבאן.</p>
                    <p className="flex items-center justify-center font-medium">
                      <Mail className="w-4 h-4 ml-1" />
                      זיהיתם תקלה? מוזמנים לפנות במייל: <span className="text-indigo-600 mr-1" dir="ltr">shay.tsaban@gmail.com</span>
                    </p>
                  </div>
                </div>

              </div>
            </div>
          </div>
        );
      }

      // ----------------------------------------------------
      // NOT ENOUGH ANSWERS PAGE
      // ----------------------------------------------------
      if (notEnoughAnswers) {
        return (
          <div className="min-h-screen bg-slate-50 flex items-center justify-center p-4 font-sans" dir="rtl">
            <div className="bg-white max-w-lg w-full rounded-3xl shadow-xl p-8 text-center border border-slate-100">
              <Info className="w-24 h-24 text-rose-500 mx-auto mb-6 drop-shadow-md" />
              <h1 className="text-3xl font-black text-slate-800 mb-4">שים לב, לא ענית על מספיק שאלות.</h1>
              <p className="text-lg text-slate-600 mb-8">דילגת על יותר מ-4 שאלות. עליך לענות על שאלות נוספות כדי לקבל קוד הגשה.</p>
              <button
                onClick={() => setNotEnoughAnswers(false)}
                className="flex items-center justify-center w-full bg-indigo-600 hover:bg-indigo-700 text-white py-4 px-6 rounded-xl font-bold transition-colors text-lg"
              >
                <ArrowRight className="w-5 h-5 ml-2" />
                חזור לתרגיל לתיקון
              </button>
            </div>
          </div>
        );
      }

      // ----------------------------------------------------
      // SUCCESS / PRINT PAGE
      // ----------------------------------------------------
      if (isFinished) {
        const finalScore = firstTryCorrect.filter(Boolean).length * 10;
        
        let scoreMessage = "";
        let scoreSubMessage = "";
        if (finalScore === 100) {
            scoreMessage = "מושלם!";
            scoreSubMessage = "שליטה מלאה בחומר, עבודה מעולה.";
        }
        else if (finalScore >= 80) {
            scoreMessage = "עבודה יפה מאוד!";
            scoreSubMessage = "השלמת בהצלחה את התרגיל.";
        }
        else if (finalScore >= 60) {
            scoreMessage = "ציון טוב!";
            scoreSubMessage = "אבל יש עוד מקום לשיפור והבנה מעמיקה יותר.";
        }
        else {
            scoreMessage = "לא נורא!";
            scoreSubMessage = "כדאי לחזור על החומר ולתרגל שוב כדי להשתפר.";
        }

        return (
          <div className="min-h-screen bg-slate-50 flex items-center justify-center p-4 font-sans" dir="rtl">
            
            {/* VIEW MODE */}
            <div className="no-print bg-white max-w-lg w-full rounded-3xl shadow-xl p-8 text-center border border-slate-100">
              <Trophy className="w-24 h-24 text-yellow-500 mx-auto mb-6 drop-shadow-md" />
              <h1 className="text-3xl font-black text-slate-800 mb-2">{scoreMessage}</h1>
              <p className="text-lg text-slate-600 mb-8">{scoreSubMessage}</p>
              
              <div className="bg-indigo-50 border border-indigo-100 rounded-2xl p-6 mb-8 shadow-sm">
                <p className="text-sm text-indigo-800 font-semibold mb-2">הציון הסופי שלך (מתוך 100):</p>
                <p className="text-6xl font-black text-indigo-600 mb-6">{finalScore}</p>
                
                <div className="border-t border-indigo-200 pt-5 text-right">
                  <p className="text-sm text-rose-600 mb-3 font-bold bg-rose-50 p-3 rounded-lg border border-rose-100">
                    הנחיות הגשה: עליך להעתיק את הקוד להלן לתיבת ההגשה באתר וזהו.
                  </p>
                  <p className="text-sm text-slate-600 mb-2 font-medium text-center">קוד ההגשה שלך:</p>
                  <code className="bg-white px-6 py-3 rounded-xl text-2xl font-mono text-slate-800 border border-slate-200 shadow-inner select-all block text-center tracking-widest">
                    {submissionCode}
                  </code>
                </div>
              </div>

              <div className="grid grid-cols-2 gap-4">
                <button
                  onClick={() => window.print()}
                  className="flex flex-col items-center justify-center w-full bg-slate-100 hover:bg-slate-200 text-slate-800 py-3 px-2 rounded-xl font-bold transition-colors border border-slate-300"
                >
                  <div className="flex items-center mb-1">
                    <Printer className="w-5 h-5 ml-2" />
                    <span>הדפס נסח</span>
                  </div>
                  <span className="text-[0.65rem] font-normal text-slate-500">(Ctrl+P אם הכפתור לא מגיב)</span>
                </button>
                <button
                  onClick={handleRestart}
                  className="flex items-center justify-center w-full bg-slate-800 hover:bg-slate-700 text-white py-3 px-4 rounded-xl font-bold transition-colors"
                >
                  <RefreshCcw className="w-5 h-5 ml-2" />
                  התחל מחדש
                </button>
              </div>
            </div>

            {/* PRINT MODE HIDDEN CONTAINER */}
            <div id="print-area" className="text-right w-full bg-white p-8">
              <div className="text-center border-b-2 border-slate-800 pb-6 mb-8">
                <h1 className="text-3xl font-black mb-2">תרגיל הגשה 1 במאקרו כלכלה</h1>
                <h2 className="text-xl">נסח שאלות ותשובות מסכם</h2>
                <div className="flex justify-between mt-8 text-lg font-bold">
                  <span>ציון סופי: {finalScore} / 100</span>
                  <span>קוד הגשה: {submissionCode}</span>
                </div>
              </div>

              <div className="space-y-10">
                {questions.map((q, i) => (
                  <div key={i} className="border border-slate-200 rounded-xl p-6 page-break-inside-avoid">
                    <div className="flex items-center justify-between mb-4">
                      <h3 className="font-bold text-lg">שאלה {i + 1}</h3>
                      <span className={`px-3 py-1 rounded-full text-sm font-bold ${firstTryCorrect[i] ? 'bg-emerald-100 text-emerald-800' : 'bg-rose-100 text-rose-800'}`}>
                        {firstTryCorrect[i] ? 'ענית נכון בניסיון ראשון (10 נק\')' : 'לא נענה נכון בניסיון ראשון (0 נק\')'}
                      </span>
                    </div>
                    
                    <div className="mb-6 text-slate-800">{q.question}</div>
                    
                    <div className="space-y-3">
                      {q.options.map((opt, optIdx) => {
                        const isCorrect = optIdx === q.correctAnswer;
                        const isUserSelected = userAnswers[i] === optIdx;
                        
                        let bg = "bg-slate-50 text-slate-500 border-slate-200";
                        let icon = null;
                        let fontWeight = "font-normal";

                        if (isCorrect) {
                          bg = "bg-emerald-50 border-emerald-500 text-emerald-800";
                          fontWeight = "font-bold";
                          icon = <CheckCircle className="w-5 h-5 ml-2 text-emerald-600" />;
                        } else if (isUserSelected && !isCorrect) {
                          bg = "bg-rose-50 border-rose-500 text-rose-800";
                          fontWeight = "font-bold";
                          icon = <XCircle className="w-5 h-5 ml-2 text-rose-600" />;
                        }

                        return (
                          <div key={optIdx} className={`flex items-center justify-between p-3 border rounded-lg ${bg} ${fontWeight}`}>
                            <span className="flex-1 text-right">{opt}</span>
                            {icon}
                            {isUserSelected && !isCorrect && <span className="text-xs text-rose-600 mr-4 font-bold border border-rose-300 px-2 py-0.5 rounded bg-white">התשובה שסימנת בסוף</span>}
                            {isCorrect && <span className="text-xs text-emerald-600 mr-4 font-bold border border-emerald-300 px-2 py-0.5 rounded bg-white">התשובה הנכונה</span>}
                          </div>
                        )
                      })}
                    </div>
                  </div>
                ))}
              </div>
            </div>

          </div>
        );
      }

      const renderStep = (step, idx) => {
        if (step.type === 'text') {
          return <p key={idx} className="text-slate-700 font-medium mt-4 mb-2">{step.content}</p>;
        } else if (step.type === 'math') {
          return (
            <MathBlock key={idx}>
              {step.content}
            </MathBlock>
          );
        }
      };

      return (
        <div className="min-h-screen bg-slate-50 py-8 px-4 font-sans" dir="rtl">
          
          <div className="max-w-3xl mx-auto">
            
            <div className="flex justify-between items-center mb-6">
              <div>
                <h1 className="text-2xl font-black text-slate-800">תרגיל הגשה 1</h1>
                <p className="text-sm text-slate-500 font-medium">ביקוש מצרפי ושיווי משקל</p>
              </div>
              <div className="bg-white px-5 py-2 rounded-full shadow-sm border border-slate-200 flex items-center">
                <span className="text-slate-400 text-sm ml-2">שאלה</span>
                <span className="font-bold text-indigo-600 text-lg">{currentIndex + 1}</span>
                <span className="text-slate-300 mx-1">/</span>
                <span className="font-bold text-slate-600">{questions.length}</span>
              </div>
            </div>

            {/* Questions Navigator (1 to 10) */}
            <div className="flex justify-center flex-wrap gap-2 mb-6">
              {questions.map((_, idx) => (
                <button
                  key={idx}
                  onClick={() => setCurrentIndex(idx)}
                  className={`w-10 h-10 rounded-full font-bold transition-colors ${currentIndex === idx ? 'bg-indigo-600 text-white' : statuses[idx] === 'correct' ? 'bg-emerald-100 text-emerald-800 border border-emerald-300' : statuses[idx] === 'failed' ? 'bg-rose-100 text-rose-800 border border-rose-300' : 'bg-white border border-slate-300 text-slate-600 hover:bg-slate-100 shadow-sm'}`}
                >
                  {idx + 1}
                </button>
              ))}
            </div>

            <div className="flex justify-between items-center mb-6 px-1">
               <button
                 onClick={handlePrev}
                 disabled={currentIndex === 0}
                 className={`flex items-center text-sm font-bold transition-colors ${currentIndex === 0 ? 'text-slate-300 cursor-not-allowed' : 'text-indigo-600 hover:text-indigo-800'}`}
               >
                 <ArrowRight className="w-4 h-4 ml-1" />
                 שאלה קודמת
               </button>
               <button
                 onClick={() => {
                   if (currentIndex === questions.length - 1) {
                      handleFinish();
                   } else {
                      handleNext();
                   }
                 }}
                 className="flex items-center text-sm font-bold text-indigo-600 hover:text-indigo-800 transition-colors bg-indigo-50 px-4 py-1.5 rounded-full"
               >
                 {currentIndex === questions.length - 1 ? 'לסיום והגשה' : 'שאלה הבאה'}
                 {currentIndex !== questions.length - 1 && <ArrowLeft className="w-4 h-4 mr-1" />}
               </button>
            </div>

            <div className="bg-white rounded-3xl shadow-sm border border-slate-200 overflow-hidden mb-6">
              <div className="p-6 md:p-8 md:pb-6">
                <div className="text-slate-800 mb-8">
                  {currentQ.question}
                </div>

                <div className="space-y-4">
                  {currentQ.options.map((option, index) => {
                    let btnStyle = "bg-slate-50 border-slate-200 text-slate-700 hover:bg-slate-100 hover:border-slate-300";
                    
                    if (currentSelected === index) {
                      btnStyle = "bg-indigo-50 border-indigo-500 text-indigo-800 ring-2 ring-indigo-500/20";
                    }
                    
                    if (currentStatus === 'correct' || currentStatus === 'failed') {
                      if (index === currentQ.correctAnswer) {
                        btnStyle = "bg-emerald-50 border-emerald-500 text-emerald-800 ring-2 ring-emerald-500/20";
                      } else if (index === currentSelected && index !== currentQ.correctAnswer) {
                        btnStyle = "bg-rose-50 border-rose-300 text-rose-500 opacity-60";
                      } else {
                        btnStyle = "bg-slate-50 border-slate-200 text-slate-400 opacity-50";
                      }
                    }

                    if ((currentStatus === 'wrong1' || currentStatus === 'wrong2') && index === currentSelected) {
                       btnStyle = "bg-rose-50 border-rose-500 text-rose-800 ring-2 ring-rose-500/20";
                    }

                    return (
                      <button
                        key={index}
                        onClick={() => handleSelectAnswer(index)}
                        disabled={currentStatus === 'correct' || currentStatus === 'failed'}
                        className={`w-full text-right p-5 rounded-2xl border-2 transition-all duration-200 md:text-lg ${btnStyle}`}
                      >
                        <div className="flex items-center justify-between font-medium leading-relaxed">
                          <span className="text-right w-full">{option}</span>
                          
                          {(currentStatus === 'correct' || currentStatus === 'failed') && index === currentQ.correctAnswer && 
                            <CheckCircle className="w-6 h-6 text-emerald-600 flex-shrink-0 ml-2" />
                          }
                          {(currentStatus === 'correct' || currentStatus === 'failed') && index === currentSelected && index !== currentQ.correctAnswer && 
                            <XCircle className="w-6 h-6 text-rose-500 flex-shrink-0 ml-2" />
                          }
                        </div>
                      </button>
                    );
                  })}
                </div>
              </div>

              <div className="px-6 md:px-8">
                {currentStatus === 'wrong1' && (
                  <div className="bg-amber-50 border border-amber-200 p-4 rounded-2xl mb-6 flex items-start animate-in fade-in slide-in-from-top-2">
                    <Info className="w-6 h-6 text-amber-600 ml-3 flex-shrink-0 mt-0.5" />
                    <div>
                      <h4 className="font-bold text-amber-800">אופס! טעות.</h4>
                      <p className="text-amber-700 text-sm mt-1">יש לך הזדמנות נוספת לנסות. קרא/י את השאלה שוב וסמן/י תשובה אחרת.</p>
                    </div>
                  </div>
                )}

                {showHints[currentIndex] && currentStatus !== 'failed' && currentStatus !== 'correct' && (
                  <div className="bg-blue-50 border border-blue-200 p-5 rounded-2xl mb-6 flex items-start animate-in fade-in slide-in-from-top-2 shadow-sm w-full">
                    <Lightbulb className="w-6 h-6 text-blue-600 ml-3 flex-shrink-0 mt-0.5" />
                    <div className="w-full">
                      <h4 className="font-bold text-blue-800 text-lg mb-2">טעות נוספת. הנה רמז שיעזור:</h4>
                      <div className="text-blue-900 font-medium leading-relaxed w-full">
                        {currentQ.hint}
                      </div>
                    </div>
                  </div>
                )}

                {currentStatus === 'correct' && (
                  <div className="bg-emerald-50 border border-emerald-200 p-5 rounded-2xl mb-6 flex items-center animate-in fade-in zoom-in-95 shadow-sm">
                    <CheckCircle className="w-8 h-8 text-emerald-600 ml-4 flex-shrink-0" />
                    <h4 className="font-black text-emerald-800 text-xl">תשובה נכונה! מצוין.</h4>
                  </div>
                )}

                {currentStatus === 'failed' && (
                  <div className="bg-rose-50 border border-rose-200 p-5 rounded-2xl mb-6 flex items-center animate-in fade-in zoom-in-95 shadow-sm">
                    <XCircle className="w-8 h-8 text-rose-600 ml-4 flex-shrink-0" />
                    <div>
                      <h4 className="font-black text-rose-800 text-xl">שגוי.</h4>
                      <p className="text-rose-700 mt-1">לא נורא! המטרה היא ללמוד. הנה הפתרון המלא והמפורט למטה.</p>
                    </div>
                  </div>
                )}
                
                {showExplanations[currentIndex] && (
                  <div className="bg-slate-50 border border-slate-200 p-6 md:p-8 rounded-2xl mb-6 shadow-inner animate-in fade-in slide-in-from-bottom-4 overflow-hidden">
                    <h3 className="font-black text-slate-800 text-lg mb-2 flex items-center">
                      <Calculator className="w-5 h-5 ml-2 text-indigo-600" />
                      פיתוח הפתרון המלא:
                    </h3>
                    <div className="flex flex-col items-start w-full">
                      {currentQ.explanationSteps.map((step, idx) => renderStep(step, idx))}
                    </div>
                  </div>
                )}
              </div>

              <div className="bg-slate-50 border-t border-slate-100 p-6 flex justify-end">
                {(currentStatus === 'idle' || currentStatus === 'wrong1' || currentStatus === 'wrong2') ? (
                  <button
                    onClick={handleCheck}
                    disabled={currentSelected === null}
                    className={`py-3 px-10 rounded-xl font-bold transition-all text-lg ${
                      currentSelected === null 
                        ? 'bg-slate-200 text-slate-400 cursor-not-allowed' 
                        : 'bg-indigo-600 text-white hover:bg-indigo-700 shadow-md hover:shadow-lg transform hover:-translate-y-0.5'
                    }`}
                  >
                    בדוק תשובה
                  </button>
                ) : (
                  <button
                    onClick={() => {
                       if (currentIndex === questions.length - 1) {
                          handleFinish();
                       } else {
                          handleNext();
                       }
                    }}
                    className="py-3 px-10 rounded-xl font-bold bg-slate-800 text-white hover:bg-slate-700 shadow-md flex items-center transition-all text-lg hover:shadow-lg transform hover:-translate-y-0.5"
                  >
                    {currentIndex === questions.length - 1 ? 'סיום והגשה' : 'המשך לשאלה הבאה'}
                    {currentIndex !== questions.length - 1 && <ArrowLeft className="w-6 h-6 mr-1" />}
                  </button>
                )}
              </div>
            </div>

          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
